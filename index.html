<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WorkPulse — Staff App</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0f0f13; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Plus Jakarta Sans',sans-serif; }
#root { width:100%; max-width:420px; height:100vh; max-height:900px; position:relative; overflow:hidden; }
::-webkit-scrollbar { width:0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── THEME ───────────────────────────────────────────────
const T = {
  bg: '#0f0f13',
  surface: '#1a1a23',
  surface2: '#22222e',
  border: '#2e2e3d',
  accent: '#6c63ff',
  accent2: '#ff6b9d',
  green: '#00d68f',
  amber: '#ffb84d',
  red: '#ff4d6d',
  text: '#f0f0f8',
  muted: '#6b6b8a',
  card: '#1e1e28',
};

// ─── ICONS ───────────────────────────────────────────────
const Icon = ({ name, size=20, color=T.text }) => {
  const icons = {
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    game: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="11" r="1" fill={color}/><circle cx="17" cy="13" r="1" fill={color}/><path d="M4 7h16a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/></svg>,
    file: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
    book: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
    send: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke={color} strokeWidth="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  };
  return icons[name] || null;
};

// ─── STORAGE HELPERS ─────────────────────────────────────
const store = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── SHARED COMPONENTS ───────────────────────────────────
const Btn = ({ children, onClick, color=T.accent, style={}, outline=false, small=false }) => (
  <button onClick={onClick} style={{
    background: outline ? 'transparent' : color,
    border: `1.5px solid ${outline ? color : 'transparent'}`,
    color: outline ? color : '#fff',
    padding: small ? '8px 16px' : '14px 24px',
    borderRadius: 14,
    fontSize: small ? 13 : 15,
    fontWeight: 700,
    fontFamily: 'Plus Jakarta Sans',
    cursor: 'pointer',
    transition: 'all .2s',
    ...style,
  }}>{children}</button>
);

const Input = ({ label, type='text', value, onChange, placeholder, style={} }) => (
  <div style={{ marginBottom: 16 }}>
    {label && <div style={{ fontSize: 12, color: T.muted, fontWeight: 600, letterSpacing: 1, marginBottom: 6, textTransform: 'uppercase' }}>{label}</div>}
    <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{
        width: '100%', padding: '13px 16px',
        background: T.surface2, border: `1.5px solid ${T.border}`,
        borderRadius: 12, color: T.text, fontSize: 15,
        fontFamily: 'Plus Jakarta Sans', outline: 'none', ...style,
      }} />
  </div>
);

const Card = ({ children, style={} }) => (
  <div style={{ background: T.card, borderRadius: 18, border: `1px solid ${T.border}`, padding: 18, ...style }}>
    {children}
  </div>
);

const Badge = ({ children, color=T.accent }) => (
  <span style={{ background: color+'22', color, fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 100, letterSpacing:.5 }}>{children}</span>
);

// ─── AUTH SCREENS ─────────────────────────────────────────
const AuthScreen = ({ onAuth }) => {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ name:'', email:'', dept:'', password:'' });
  const [err, setErr] = useState('');

  const set = k => v => setForm(f => ({...f, [k]: v}));

  const handleLogin = () => {
    const users = store.get('wp_users', []);
    const u = users.find(u => u.email === form.email && u.password === form.password);
    if (!u) { setErr('Invalid email or password.'); return; }
    store.set('wp_session', u);
    onAuth(u);
  };

  const handleSignup = () => {
    if (!form.name || !form.email || !form.password) { setErr('All fields required.'); return; }
    const users = store.get('wp_users', []);
    if (users.find(u => u.email === form.email)) { setErr('Email already registered.'); return; }
    const u = { id: Date.now(), name: form.name, email: form.email, dept: form.dept || 'General', password: form.password, avatar: form.name[0].toUpperCase(), joined: new Date().toISOString() };
    store.set('wp_users', [...users, u]);
    store.set('wp_session', u);
    onAuth(u);
  };

  return (
    <div style={{ height:'100%', background: T.bg, display:'flex', flexDirection:'column', justifyContent:'center', padding: 28, overflowY:'auto' }}>
      {/* Logo */}
      <div style={{ textAlign:'center', marginBottom: 40 }}>
        <div style={{ width:72, height:72, background:`linear-gradient(135deg,${T.accent},${T.accent2})`, borderRadius:22, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px', boxShadow:`0 12px 40px ${T.accent}44` }}>
          <span style={{ fontSize:32 }}>⚡</span>
        </div>
        <div style={{ fontSize:28, fontWeight:800, color:T.text, letterSpacing:-1 }}>WorkPulse</div>
        <div style={{ color:T.muted, fontSize:14, marginTop:4 }}>Staff Attendance & Hours</div>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', background:T.surface, borderRadius:14, padding:4, marginBottom:28 }}>
        {['login','signup'].map(t => (
          <button key={t} onClick={()=>{setTab(t);setErr('');}} style={{
            flex:1, padding:'10px', borderRadius:11, border:'none',
            background: tab===t ? T.accent : 'transparent',
            color: tab===t ? '#fff' : T.muted, fontWeight:700, fontSize:14,
            fontFamily:'Plus Jakarta Sans', cursor:'pointer', transition:'all .2s'
          }}>{t==='login'?'Sign In':'Register'}</button>
        ))}
      </div>

      {tab === 'signup' && <Input label="Full Name" value={form.name} onChange={set('name')} placeholder="Amara Johnson" />}
      <Input label="Work Email" type="email" value={form.email} onChange={set('email')} placeholder="you@company.com" />
      {tab === 'signup' && <Input label="Department" value={form.dept} onChange={set('dept')} placeholder="Design, Engineering…" />}
      <Input label="Password" type="password" value={form.password} onChange={set('password')} placeholder="••••••••" />

      {err && <div style={{ color:T.red, fontSize:13, marginBottom:14, textAlign:'center' }}>{err}</div>}

      <Btn onClick={tab==='login'?handleLogin:handleSignup} style={{ width:'100%' }}>
        {tab==='login' ? 'Sign In →' : 'Create Account →'}
      </Btn>

      <div style={{ textAlign:'center', color:T.muted, fontSize:13, marginTop:20 }}>
        {tab==='login' ? "Don't have an account? " : "Already registered? "}
        <span style={{ color:T.accent, cursor:'pointer', fontWeight:700 }} onClick={()=>{setTab(tab==='login'?'signup':'login');setErr('');}}>
          {tab==='login'?'Register':'Sign In'}
        </span>
      </div>
    </div>
  );
};

// ─── BOTTOM NAV ───────────────────────────────────────────
const NAV = [
  { key:'home', label:'Home', icon:'home' },
  { key:'calendar', label:'Calendar', icon:'calendar' },
  { key:'todo', label:'Tasks', icon:'check' },
  { key:'game', label:'Break', icon:'game' },
  { key:'invoice', label:'Invoice', icon:'file' },
  { key:'kb', label:'Ideas', icon:'book' },
];

const BottomNav = ({ page, setPage }) => (
  <div style={{ position:'absolute', bottom:0, left:0, right:0, background:T.surface, borderTop:`1px solid ${T.border}`, display:'flex', padding:'8px 0 12px', zIndex:100 }}>
    {NAV.map(n => {
      const active = page === n.key;
      return (
        <button key={n.key} onClick={()=>setPage(n.key)} style={{
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3,
          background:'none', border:'none', cursor:'pointer',
          color: active ? T.accent : T.muted,
          fontSize:10, fontWeight: active?700:500, fontFamily:'Plus Jakarta Sans',
          transition:'all .2s',
        }}>
          <div style={{ transform: active?'scale(1.15)':'scale(1)', transition:'transform .2s' }}>
            <Icon name={n.icon} size={20} color={active?T.accent:T.muted} />
          </div>
          {n.label}
        </button>
      );
    })}
  </div>
);

// ─── HOME / ATTENDANCE PAGE ───────────────────────────────
const HomePage = ({ user }) => {
  const todayKey = new Date().toDateString();
  const [att, setAtt] = useState(() => store.get('wp_att_'+user.id, {}));
  const [clockRunning, setClockRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [startTime, setStartTime] = useState(null);
  const [note, setNote] = useState(() => store.get('wp_note_'+user.id, ''));
  const timerRef = useRef(null);

  const todayAtt = att[todayKey] || {};

  useEffect(()=>{
    if (todayAtt.start && !todayAtt.end) {
      setClockRunning(true);
      setStartTime(new Date(todayAtt.start));
    }
  }, []);

  useEffect(()=>{
    if (clockRunning && startTime) {
      timerRef.current = setInterval(()=>{
        setElapsed(Math.floor((Date.now() - startTime.getTime())/1000));
      }, 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return ()=>clearInterval(timerRef.current);
  }, [clockRunning, startTime]);

  const clockIn = () => {
    const now = new Date();
    const updated = { ...att, [todayKey]: { start: now.toISOString(), status:'present' } };
    setAtt(updated); store.set('wp_att_'+user.id, updated);
    setStartTime(now); setClockRunning(true); setElapsed(0);
  };

  const clockOut = () => {
    const now = new Date();
    const updated = { ...att, [todayKey]: { ...todayAtt, end: now.toISOString() } };
    setAtt(updated); store.set('wp_att_'+user.id, updated);
    setClockRunning(false);
  };

  const fmt = secs => {
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  const now = new Date();
  const greeting = now.getHours()<12?'Good morning':'now.getHours()<17'?'Good afternoon':'Good evening';
  const greet = now.getHours()<12?'Good morning ☀️':now.getHours()<17?'Good afternoon 🌤️':'Good evening 🌙';

  // Weekly stats
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-i);
    const k = d.toDateString();
    return { label: d.toLocaleDateString('en',{weekday:'short'}), present: !!att[k] };
  }).reverse();

  const saveNote = () => store.set('wp_note_'+user.id, note);

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'20px 18px 100px' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24 }}>
        <div>
          <div style={{ fontSize:14, color:T.muted }}>{greet}</div>
          <div style={{ fontSize:22, fontWeight:800, color:T.text, letterSpacing:-0.5 }}>{user.name.split(' ')[0]}</div>
        </div>
        <div style={{ width:44, height:44, background:`linear-gradient(135deg,${T.accent},${T.accent2})`, borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, fontWeight:800, color:'#fff' }}>
          {user.avatar}
        </div>
      </div>

      {/* Clock Card */}
      <Card style={{ background:`linear-gradient(135deg,${T.accent}22,${T.accent2}11)`, border:`1px solid ${T.accent}44`, marginBottom:16, textAlign:'center' }}>
        <div style={{ fontSize:48, fontWeight:800, color:T.text, fontFamily:'DM Mono', letterSpacing:2 }}>
          {fmt(elapsed)}
        </div>
        <div style={{ color:T.muted, fontSize:13, marginBottom:16 }}>
          {todayAtt.start ? `Clocked in at ${new Date(todayAtt.start).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}` : 'Not yet clocked in'}
          {todayAtt.end ? ` · Out at ${new Date(todayAtt.end).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}` : ''}
        </div>
        <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
          {!clockRunning && !todayAtt.end && (
            <Btn onClick={clockIn} color={T.green} style={{ flex:1 }}>⏱ Clock In</Btn>
          )}
          {clockRunning && (
            <Btn onClick={clockOut} color={T.red} style={{ flex:1 }}>⏹ Clock Out</Btn>
          )}
          {todayAtt.end && (
            <div style={{ color:T.green, fontWeight:700, fontSize:15, padding:'12px 0' }}>✓ Day Complete</div>
          )}
        </div>
      </Card>

      {/* Weekly Strip */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.muted, marginBottom:12, letterSpacing:.5 }}>WEEK ATTENDANCE</div>
        <div style={{ display:'flex', gap:6 }}>
          {last7.map((d,i) => (
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
              <div style={{
                width:36, height:36, borderRadius:10,
                background: d.present ? T.green : T.surface2,
                border: `1px solid ${d.present ? T.green+'44' : T.border}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:14,
              }}>{d.present ? '✓' : ''}</div>
              <div style={{ fontSize:10, color:T.muted, fontWeight:600 }}>{d.label}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Quick Note */}
      <Card style={{ marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.muted, marginBottom:10, letterSpacing:.5 }}>📝 DAILY NOTE</div>
        <textarea
          value={note} onChange={e=>{setNote(e.target.value);}}
          onBlur={saveNote}
          placeholder="Jot down anything for today…"
          style={{
            width:'100%', minHeight:80, background:T.surface2, border:`1px solid ${T.border}`,
            borderRadius:10, padding:12, color:T.text, fontSize:14,
            fontFamily:'Plus Jakarta Sans', resize:'none', outline:'none'
          }}/>
        <div style={{ fontSize:11, color:T.muted, marginTop:6 }}>Auto-saved on blur</div>
      </Card>

      {/* Quick stats */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        <Card>
          <div style={{ fontSize:11, color:T.muted, fontWeight:700, marginBottom:6 }}>THIS WEEK</div>
          <div style={{ fontSize:26, fontWeight:800, color:T.accent }}>{last7.filter(d=>d.present).length}<span style={{fontSize:14,color:T.muted}}>/7</span></div>
          <div style={{ fontSize:12, color:T.muted }}>Days Present</div>
        </Card>
        <Card>
          <div style={{ fontSize:11, color:T.muted, fontWeight:700, marginBottom:6 }}>TODAY</div>
          <div style={{ fontSize:26, fontWeight:800, color:T.green }}>
            {todayAtt.start && todayAtt.end
              ? `${((new Date(todayAtt.end)-new Date(todayAtt.start))/3600000).toFixed(1)}h`
              : clockRunning ? `${(elapsed/3600).toFixed(1)}h` : '—'}
          </div>
          <div style={{ fontSize:12, color:T.muted }}>Hours Logged</div>
        </Card>
      </div>
    </div>
  );
};

// ─── CALENDAR PAGE ────────────────────────────────────────
const CalendarPage = ({ user }) => {
  const [cur, setCur] = useState(new Date());
  const [att] = useState(()=> store.get('wp_att_'+user.id, {}));
  const [selected, setSelected] = useState(null);

  const year = cur.getFullYear(), month = cur.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const prev = () => setCur(new Date(year, month-1, 1));
  const next = () => setCur(new Date(year, month+1, 1));

  const selAtt = selected ? att[new Date(year, month, selected).toDateString()] : null;

  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'20px 18px 100px' }}>
      <div style={{ fontSize:22, fontWeight:800, color:T.text, marginBottom:20, letterSpacing:-0.5 }}>Attendance Calendar</div>

      <Card style={{ marginBottom:16 }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
          <button onClick={prev} style={{ background:'none', border:'none', color:T.text, fontSize:20, cursor:'pointer' }}>‹</button>
          <div style={{ fontWeight:800, fontSize:17, color:T.text }}>{months[month]} {year}</div>
          <button onClick={next} style={{ background:'none', border:'none', color:T.text, fontSize:20, cursor:'pointer' }}>›</button>
        </div>
        {/* Weekdays */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:8 }}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
            <div key={d} style={{ textAlign:'center', fontSize:11, color:T.muted, fontWeight:700, padding:'4px 0' }}>{d}</div>
          ))}
        </div>
        {/* Days */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4 }}>
          {Array(first).fill(null).map((_,i) => <div key={'e'+i} />)}
          {Array(days).fill(null).map((_,i) => {
            const d = i+1;
            const key = new Date(year, month, d).toDateString();
            const rec = att[key];
            const isToday = key === new Date().toDateString();
            const isSel = selected === d;
            return (
              <button key={d} onClick={()=>setSelected(isSel?null:d)} style={{
                aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center',
                borderRadius:10, border: isSel ? `2px solid ${T.accent}` : `1px solid transparent`,

const [page, setPage] = useState(‘home’);

if (!user) return <AuthScreen onAuth={setUser} />;

const renderPage = () => {

case ‘game’: return <GamePage />;
case ‘invoice’: return <InvoicePage user={user} />;
